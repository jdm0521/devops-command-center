name: CI-CD

on:
  push:
    branches:
      - main

    tags:
      - "v*"

  pull_request:


permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ github.ref_name }}


    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        if: startsWith(github.ref, 'refs/tags/')
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build Backend Image
        run: |
          docker build \
          -t ${{ secrets.ACR_NAME }}.azurecr.io/backend:${IMAGE_TAG} \
          -t ${{ secrets.ACR_NAME }}.azurecr.io/backend:latest \
          ./backend

      - name: Build Frontend Image
        run: |
          docker build \
          -t ${{ secrets.ACR_NAME }}.azurecr.io/frontend:${IMAGE_TAG} \
          -t ${{ secrets.ACR_NAME }}.azurecr.io/frontend:latest \
          ./frontend

      - name: Push Backend Image
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/backend:${IMAGE_TAG}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/backend:latest

      - name: Push Frontend Image
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/frontend:${IMAGE_TAG}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/frontend:latest