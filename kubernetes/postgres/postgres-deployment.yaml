apiVersion: apps/v1
kind: Deployment

metadata:
  name: db
  namespace: devops-command-center

spec:
  replicas: 1

  selector:
    matchLabels:
      app: db

  template:
    metadata:
      labels:
        app: db

    spec:
      containers:
      - name: db

        image: postgres:16

        envFrom:
        - secretRef:
            name: postgres-secret

        env:
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata

        ports:
        - containerPort: 5432

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "1000m"
            memory: "1Gi"

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc