apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: devops-command-center

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: jdmcommandcenter11.azurecr.io/frontend:1.3.1

        ports:
        - containerPort: 80