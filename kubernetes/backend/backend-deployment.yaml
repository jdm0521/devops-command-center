apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: devops-command-center

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend

        image: jdmcommandcenter11.azurecr.io/backend:1.3.1

        ports:
        - containerPort: 8000

        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:DevOpsLab123!@db:5432/commandcenter"