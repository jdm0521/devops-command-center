apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: devops-command-center

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: jdmcommandcenter11.azurecr.io/backend:1.3.1

        ports:
        - containerPort: 8000

        livenessProbe:
          httpGet:
            path: /
            port: 8000

          initialDelaySeconds: 30
          periodSeconds: 10

        readinessProbe:
            httpGet:
              path: /
              port: 8000

            initialDelaySeconds: 5
            periodSeconds: 5

        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: DATABASE_URL

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"